name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-docs

      - name: Setup mdBook
        run: |
          cd ~/.cargo/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.1/mdbook-v0.5.1-x86_64-unknown-linux-gnu.tar.gz | tar xvzf -
          echo "818d38d93524154bcb4847444bc0645b14da9ad729dacc7155ce477c26ac9470 mdbook" | sha256sum -c -

      - name: Check for broken links
        run: |
          curl -sSLo linkcheck.sh \
            https://raw.githubusercontent.com/rust-lang/rust/master/src/tools/linkchecker/linkcheck.sh
          # Cannot use --all here because of the generated redirect pages aren't available.
          sh linkcheck.sh book

      - name: Run vale checks
        if: ${{ github.event_name == 'pull_request' }}
        uses: errata-ai/vale-action@v2.1.1
        with:
          fail_on_error: true
          filter_mode: nofilter
          files: src

      - name: Deploy
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: appleboy/scp-action@v1
        with:
          host: docs.espressif.com
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_KEY }}
          target: ${{ secrets.PRODUCTION_TARGET }}
          source: "book/"
          strip_components: 1 # remove the book prefix, it's already being placed in /projects/rust/book
          rm: true
